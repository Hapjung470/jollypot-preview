  <script id="md" type="application/json">"# 졸리팟 AI 레시피 품질 — 개선 요청\n\n> 콘텐츠 백엔드(AI 레시피 요약) 개선 요청 · 개발사 전달용\n> Version 1.10 | 2026.06\n\n---\n\n## 0. 요청 요약\n\nAI가 영상을 레시피로 요약하는 과정에서 **\"내용은 틀리지 않았으나 실제로는 만들 수 없는\"**, 더 나아가 **\"원본 영상과 아예 다른 레시피\"**가 나오는 결함이 반복 확인됩니다. 양념 분량/단위 누락, 재료명 오역, 비현실적 수치, 재료↔조리 스텝 불일치, 그리고 **원본에 없는 재료를 지어내는 통째 환각**(§1.3, 가장 심각)까지 있습니다. 사실관계가 틀린 게 아니라 **정보가 빠지거나 어긋나거나 출처와 무관하게 생성**된 형태라, \"내용이 맞나\" 식의 검수로는 걸러지지 않습니다.\n\n- **이건 샘플입니다.** 아래 §1의 7건은 **특정 레시피 7건의 수정 요청이 아니라, 시스템 결함의 샘플**입니다. 동일 패턴이 다수 레시피에 존재할 것으로 보이므로, 개별 수정이 아니라 **발생 원인 진단 후 구조적 개선**을 요청드립니다.\n- **가장 심각한 건 §1.3(무수분 백숙)입니다.** 원본 영상(닭+양파+크레이지소스)과 졸리팟 요약(단호박+치즈+계란)이 **거의 다른 음식**입니다 — 영어 캡션에 다 있었는데 제목만 보고 다른 레시피를 생성한 것으로 보입니다. **요약이 원본에 근거하는지(groundedness) 검증**이 필요합니다(§3 Rule H).\n- **합격 기준선.** §1.5의 류수영 오징어볶음(`recipes/261`)은 결함이 거의 없는 정상 사례이며, **동일 생성 시스템에서 정상 품질이 가능함**을 보여줍니다. **이 수준이 합격선**입니다.\n- **요청 2가지:**\n  1. **(진단 협조)** 레시피 생성 입력 구성 확인 — §2의 질문.\n  2. **(개선)** 위 결함의 원인 진단 및 구조적 개선. 참고로 저희가 생각하는 안전망(검수 게이트 룰)을 §3에 정리했으나, **더 나은 방안이 있으면 환영합니다.**\n\n**전체 요약 (7건 샘플)**\n\n| 레시피 | 플랫폼 | URL | 핵심 결함 | 상태 |\n|------|:---:|------|------|:---:|\n| 비빔국수 | 인스타 | `recipes/436` | 양념 분량 전무 + 재료 목록 누락 | ❌ |\n| 소보루장조림 | 인스타 | `recipes/414` | 손질 단계 누락 + 양념 단위 미표기 | ⚠️ |\n| 무수분 백숙 | 인스타 | `recipes/430` | **통째 환각** — 원본과 다른 음식(없는 재료 날조+핵심 누락+시간 조작) | 🔴 |\n| 서먼 아보카도 덮밥 | 인스타 | `recipes/435` | 신옥 미번역 (0.8mm·생식위험은 원본 유래) | ⚠️ |\n| 류수영 오징어볶음 | 유튜브 | `recipes/261` | (경미) — 정상 | ✅ 기준선 |\n| 콩국수 비법 | 유튜브 | `recipes/(콩국수)` | (경미) — 정상, 재현 가능 | ✅ 합격 |\n| 까망베르 샤브샤브 | 인스타 | `recipes/440` | 고기 누락 + \"채소\" 뭉뚱그림 + 와사비장·분량 없음 | ❌ 부실 |\n\n> **플랫폼 = 품질**: 유튜브 2건은 모두 합격, 인스타 5건은 모두 결함(§2 참조). 표 순서는 아래 §1.1~1.7 순서와 같습니다.\n\n---\n\n## 1. 확인된 결함 (관찰 사실)\n\n각 항목은 해당 레시피 페이지에서 그대로 관찰됩니다(화면 및 `meta`/`keywords` 동일).\n\n### 1.1 비빔국수 — `https://www.jollypot.kr/recipes/436`\n- **원본 영상 자막·더보기 캡션에는 분량이 전부 텍스트로 있음**: 양념장 `고추장 크게1, 다진마늘1, 진간장4, 고춧가루2, 식초3, 설탕4, 케첩1, 참깨2, 채수4 (밥숟가락 기준)`, 절이기 `식초4, 설탕2, 맛소금 1/2티스푼`.\n- 그런데 졸리팟 요약에는 양념 8종 분량이 **전부 공란으로 누락**됨. → **입력에 텍스트로 존재했는데 요약 산출물에서 소실**된 결함(= 화면 OCR 부재 문제가 아님). 숫자 자체가 없어 표준화로도 복구 불가.\n- 자막의 **맛소금(1/2티스푼)·채수**(원본 정의: \"오이·양파 절인 물\")가 **재료 목록에서 누락**.\n- 식초·설탕이 절임·양념장 양쪽에 쓰이나 분량 배분 없음.\n- → 양념장이 요리의 본체인데 비율을 알 수 없어 **조리 재현 불가**.\n\n| 결함 유형 | 구분 | 내용 |\n|---|:---:|---|\n| 분량 전무 | 치명 | 양념 8종 분량 공란 (원본 캡션엔 전부 있었음) |\n| 재료 목록 누락 | 준치명 | 맛소금·채수 (원본에 명시·정의됨) |\n\n### 1.2 소보루장조림 — `https://www.jollypot.kr/recipes/414`\n- 양념 분량의 **단위 미표기**: 간장 12 / 설탕 2 / 올리고당 3 / 맛술 1. (한국 표기 관습상 큰술로 읽히는, 가장 경미한 패턴 — §3 Rule A-1로 \"큰술\" 자동 표준화 대상.)\n- 메추리알 **사전손질(삶기·껍질 제거) 단계 누락** — 생 메추리알 800g을 그대로 조리하게 됨. **이쪽이 실질적 결함.**\n\n| 결함 유형 | 구분 | 내용 |\n|---|:---:|---|\n| 사전손질 누락 | 준치명 | 메추리알 삶기·껍질 제거 단계 없음 |\n| 단위 미표기 | 경미 | 간장12 등 — 한국 관습, A-1 큰술 표준화 대상 |\n\n### 1.3 무수분 백숙 — `https://www.jollypot.kr/recipes/430` 🔴 **가장 심각 (통째 환각)**\n원본 영상과 졸리팟 요약이 **거의 다른 음식**입니다. (**원본 영상 47초를 프레임 단위로 직접 확인**한 결과입니다.)\n- **원본 영상 실제**: 남은 밥(→누룽지) · 닭다리 600g · 소금·후추 · 생강 · **양파** · 맛술 / **multicook 40분** / **\"크레이지 소스\": 고춧가루 3T, 설탕 1.5T, 다진마늘 1~2T, 간장 2T, 식초 0.5T, 머스타드** / 부추 + 잔열 3분.\n- **졸리팟 430 요약**: 닭다리 · **단호박·계란5개·치즈·새송이** · 올리브오일·소금 / **고압 20분**.\n- **재료 날조 (영상에 0회 등장)**: 단호박·치즈·계란·새송이·올리브오일은 **47초 영상 어디에도 나오지 않습니다.** 제목 \"무수분 백숙\"만 보고 다른 레시피를 생성한 것으로 보입니다. *(\"계란 5개\"는 손으로 올리는 양파 반쪽(자막 \"onion\")을 오인한 것으로 추정됩니다.)*\n- **핵심 누락 (영상엔 있음)**: 정체성인 \"크레이지 소스\"(머스타드 포함) 전체, 양파, 부추, **밥(누룽지)**이 요약에 없음.\n- **시간 조작(안전)**: 화면자막 \"multicook 40mins\"인데 요약은 20분. 닭다리 600g 무수분 20분은 **속이 안 익어 식중독 위험**.\n- → 사용자가 영상을 보고 저장했는데 **전혀 다른 음식 레시피**를 받게 됩니다. 신뢰 직결.\n\n| 결함 유형 | 구분 | 내용 |\n|---|:---:|---|\n| 재료 날조(환각) | 치명 | 단호박·치즈·계란·새송이·올리브오일 — 영상 0회 등장 |\n| 핵심 양념·단계 누락 | 치명 | \"크레이지 소스\"(머스타드 포함) 전체 |\n| 재료 목록 누락 | 준치명 | 양파·부추·밥(누룽지) |\n| 조리시간 조작 | 치명 | 40분 → 20분 |\n| 식품 안전 위험 | 치명 | 닭다리 600g 무수분 20분 = 덜 익음(식중독) |\n\n### 1.4 서먼 아보카도 덮밥 — `https://www.jollypot.kr/recipes/435` (일본어 원본)\n**원본 캡션 대조 결과, 일부는 졸리팟 결함이 아니라 원본 자체의 값/표기였습니다.**\n- **재료명 오역 \"신옥\" (졸리팟 결함)**: 원본 新玉ねぎ(=햇양파)을 한자 음독 \"신옥\"으로 미번역 → 사용자 식별 불가. (조리 스텝 \"물에 담가 매운맛 빼기\"로 보아 햇양파가 맞음.)\n- **\"아보카도 0.8mm\" = 원본 오타를 그대로 복사**: 원본 캡션이 직접 \"아보카도 0.8mm 두께로\" 명시함(작성자 오타, 0.8cm 추정). 졸리팟이 지어낸 게 아니라 **충실히 복사**한 값 → 출처 오타. 다만 물리적으로 불가능하므로 sanity-check(§3 Rule D)로 보정 권장.\n- **생식 안전 — 원본은 \"사시미용(刺身用) 연어\" 명시**: 즉 **레시피 자체는 안전**(생식 가능 등급 사용). 쟁점은 졸리팟이 이 \"사시미용\" 자격을 보존했는지 — 드롭하고 \"서먼\"으로만 표기했다면 **안전 라벨 소실(요약 손실)**이지, 레시피가 위험한 게 아님. *(졸리팟 현재 표기 확인 필요.)*\n- → 확정된 졸리팟 결함은 **\"신옥 미번역\"**, 그리고 (확인 시) **\"사시미용 라벨 드롭\"**. 0.8mm·생식 위험은 원본에서 비롯된 것.\n\n| 결함 유형 | 구분 | 내용 |\n|---|:---:|---|\n| 재료명 오역 | 치명 | 新玉ねぎ(햇양파)을 \"신옥\"으로 미번역 → 장보기 막힘 (졸리팟 결함) |\n| 안전 라벨 소실 *(확인 필요)* | 준치명 | 원본 \"사시미용 연어\" 명시 — 졸리팟이 자격 드롭 시 |\n| (참고) 0.8mm | 출처 | 원본 캡션의 오타를 복사 — 졸리팟 환각 아님(Rule D로 보정) |\n\n### 1.5 류수영 오징어볶음 — `https://www.jollypot.kr/recipes/261` ✅ 정상 (합격 기준선)\n- 양념 단위 모두 표기(고추장 1숟갈·고춧가루 3숟갈·간장 4숟갈·설탕 3숟갈·참기름 1숟갈), 조리 흐름에 시간·불세기 구체적.\n- 경미: 식용유가 조리 스텝에 등장하나 재료 목록에 없음(\"넉넉히 3바퀴\"로 분량은 제시됨). 오징어 손질 단계 미명시.\n- → **이 수준이 합격선.**\n\n| 결함 유형 | 구분 | 내용 |\n|---|:---:|---|\n| 재료 목록 누락 | 예외 | 식용유 (팬트리 기본 재료, 면제) |\n| 사전손질 누락 | 경미 | 오징어 손질 미명시 (손질 오징어 유통으로 영향 낮음) |\n\n→ 결함다운 결함 없음. **합격 기준선(양성 대조군).**\n\n### 1.6 콩국수 더 맛있게 만드는 비법 — `recipes/(콩국수)` ✅ 정상 (두 번째 합격 사례)\n원본 영상(한국어 자막 또렷)과 졸리팟 변환본이 거의 1:1로 일치합니다.\n- 중면 4분 삶기 / 3분 후 콩나물 1분 데치기 / 시판 콩국물 1팩 / **땅콩버터 반 큰술을 체에 받쳐 풀기**(영상의 핵심 테크닉 보존) / 오이·당근 채·삶은 달걀 토핑 / 굵은 소금 / 얼음 — 모두 영상과 일치, 분량·시간도 구체적.\n- 환각·핵심 누락·시간 조작·안전 위험 전부 없음. 초보가 그대로 재현 가능.\n\n| 결함 유형 | 구분 | 내용 |\n|---|:---:|---|\n| 재료 목록 누락 | 예외 | 얼음 — 조리법엔 있으나 목록엔 없음(물/팬트리급, 면제) |\n\n→ 결함다운 결함 없음. **재현 가능 · 합격선급.** (자막이 또렷한 한국어 단일 영상이라 충실히 추출됨.)\n\n### 1.7 까망베르 치즈 넣은 샤브샤브 — `https://www.jollypot.kr/recipes/440` (인스타) ❌ 부실 (재현 어려움)\n원본 영상엔 **자막이 전혀 없고** 캡션도 일기체(분량·재료 종류·고기 언급 없음)라, 졸리팟이 뼈대만 추출했습니다. (환각은 아님 — 나열한 건 다 영상에 있으나, 빠지거나 뭉뚱그려짐.)\n- **고기 누락**: 영상엔 샤브샤브용 소고기를 분명히 넣고 익혀 먹는데, 졸리팟 재료에 없음(캡션 미언급 → 영상 시각 정보 미반영).\n- **\"채소\" 뭉뚱그림**: 영상은 배추·청경채·표고·만가닥버섯을 구체적으로 손질하는데, 졸리팟은 \"채소\" 한 단어 → 장보기 불가.\n- **\"와사비장\" 레시피 없음**: step 5 \"와사비장을 만들어 주세요\"인데 구성(간장+와사비 등)이 없음 → 못 만듦.\n- **분량 전무**: 까망베르 몇 통·육수 얼마 등 모든 정량 없음.\n\n| 결함 유형 | 구분 | 내용 |\n|---|:---:|---|\n| 재료 누락 | 치명 | 샤브샤브용 소고기 — 영상엔 분명히 있으나 졸리팟에 없음 |\n| 재료 부실(뭉뚱그림) | 치명 | \"채소\"로만 표기 — 배추·청경채·표고·만가닥 등 구체 전무 → 장보기 불가 |\n| 핵심 단계 부실 | 치명 | \"와사비장 만들기\"인데 구성 없음 → 못 만듦 |\n| 분량 전무 | 치명 | 모든 재료 양 없음 |\n| (참고) 환각 | — | 없음 — 나열된 건 다 영상에 있음(부실하나 날조 아님) |\n\n→ **재현 어려움.** 개념은 전달되나 고기·채소 종류·와사비장·분량을 알 수 없어 그대로는 못 만든다. **원인: 자막 없는 영상 + 모호한 캡션** → 텍스트가 빈약하니 졸리팟이 시각으로만 등장하는 재료(고기·채소 종류)를 못 잡음(§2 참조).\n\n---\n\n## 2. 먼저 확인 부탁드립니다 (진단)\n\n원인 위치를 좁히기 위한 확인 요청입니다. (특히 §1.1 비빔국수는 분량이 **원본 캡션에 텍스트로 다 있었는데도** 누락됐습니다.)\n\n> **레시피 생성 단계에서 요약 모델에 무엇을 입력하나요? — ① 음성(STT), ② 화면 자막 OCR, ③ 영상 더보기/설명 캡션 텍스트 중 무엇을 넣나요? 캡션을 넣는다면, 거기 있던 분량(고추장 크게1, 진간장4…)이 왜 누락됐나요?**\n\n(분량·단위 누락이 반복되는 패턴의 원인 위치를 파악하기 위함입니다.)\n\n**관찰: 졸리팟 품질이 \"텍스트 가용성\"에 정비례합니다.** 자막이 또렷한 콩국수(§1.6)는 충실히 추출됐고, 자막 없이 캡션만 모호한 샤브샤브(§1.7)는 뼈대만 남았습니다. 이로 보아 입력 갭이 **두 종류**입니다:\n1. **텍스트가 화면 그래픽에만** 있음 → OCR로 해결 (430 양파, 436 분량).\n2. **재료가 영상에 시각으로만** 등장(텍스트 자체가 없음) → **시각/멀티모달 인식**이 필요 (샤브샤브의 고기·채소 종류). 텍스트가 없으면 현재 파이프라인은 이를 못 잡습니다.\n\n**관찰: 플랫폼이 품질을 가릅니다.** 7개 중 합격 2건(261·콩국수)이 **정확히 유튜브**, 결함 5건(414·435·436·430·샤브샤브)이 **정확히 인스타**입니다. 유튜브는 자동 자막·설명란이 풍부하고 제미나이가 URL을 네이티브로 받지만, 인스타는 그렇지 않습니다.\n\n> **추가 질문: 유튜브와 인스타를 같은 경로로 처리하나요? — 인스타는 제미나이 3.5 Flash에 ⓐ 영상 파일을 직접 넣나요, 아니면 ⓑ 캡션 텍스트만 넣나요? (영상을 넣으면 3.5 Flash가 오디오 STT·프레임 시각인식·화면 OCR을 한 번에 처리합니다.)**\n\nⓑ(캡션만)라면 그것이 인스타 결함의 핵심 원인일 가능성이 높습니다. 권장 처리 방식과 토큰 분석은 별도 정리본(§1.6.1)에 있습니다 — 릴스는 짧아 **토큰 한도는 문제가 아니며**(90초도 컨텍스트 3% 미만), 실제 과제는 영상 다운로드의 안정성입니다.\n\n---\n\n## 3. 참고 — 저희가 제안하는 안전망 (검수 게이트)\n\n원인 개선과 별개로, 잘못된 요약이 사용자에게 노출되기 전에 거르는 **저장/노출 직전 검수 게이트**를 제안합니다. 대부분 추가 LLM 호출 없는 **결정론 룰**입니다. **저희 제안일 뿐이며, 더 나은 방안이 있으면 환영합니다.**\n\n각 룰은 식별자·발동 조건·사유 코드(`reason`)로 정의합니다.\n\n### Rule A (결정론) — 양념 분량 처리\n양념계열 재료의 분량 표기를 처리한다. 한국 레시피는 \"간장 2큰술\"을 **\"간장 2\"로 단위를 생략하는 표기가 흔하다**(이 크리에이터의 캡션도 \"간장12, 설탕2\"로 동일). 따라서 단위 없는 정수는 **차단이 아니라 표준화**하고, 큰술로 보기엔 과한 큰 수만 보류한다.\n\n- **A-1 단위 소실 → 큰술 표준화 (+ 상한 보류)**: 장류·당류 양념에 **단위 없는 정수 N**이 오면(예: 414 \"간장 12\"):\n  - **N < 20** → `N큰술`로 자동 렌더링하고 **통과**(보류 안 함). 한국 양념 단위 디폴트는 큰술이고, 작은 정수는 거의 안 틀린다.\n  - **N ≥ 20** → `needs_review` 보류. 큰술로 보기엔 과해 단위가 모호하다(예: \"간장 100\"은 100큰술=1.5L → 비현실, ml일 가능성). → `ambiguous_seasoning_amount`\n  - 임계값(20)은 \"한 요리에 양념 20큰술 이상은 비정상\"이라는 단순 휴리스틱. 데이터 보고 튜닝.\n  - ⚠️ **숫자(N)는 영상/원문에서 온 값이므로 변경하지 않는다.** 빠진 \"단위\"만 큰술로 보강한다.\n- **A-2 분량 전무 → 하드 게이트 보류**: 분량 필드가 비어 있고 '적당량/약간/조금' 명시조차 없으면(예: 436 \"고추장\"(공란)) → 즉시 `needs_review` (`missing_seasoning_amount`). 붙일 숫자 자체가 없어 표준화 불가. **단, 마무리 간 양념은 공란 허용**(to-taste 예외).\n\n```\n재료명 ∈ 양념 화이트리스트:\n  IF 분량 = 단위 없는 정수 N:                         ← A-1\n       N < 20  → \"N큰술\" 렌더링하고 통과\n       N >= 20 → needs_review (단위 모호)\n  ELIF 분량 공란 AND '적당량|약간|조금' 미존재 AND 재료명 ∉ to-taste 예외:   ← A-2\n       needs_review (하드 게이트)\n```\n- **양념 화이트리스트(예)**: 간장·국간장·진간장·된장·고추장·설탕·올리고당·물엿·식초·맛술·미림·청주·액젓·고춧가루·다진마늘·다진생강·굴소스·케첩·마요네즈\n- **단위 화이트리스트(예)**: g·kg·ml·L·큰술·숟갈·T·작은술·t·컵·개·알·쪽·톨·줌·꼬집·약간·적당량·조금 (이 중 하나라도 있으면 A-1 미적용 = 그대로 통과)\n- **to-taste 예외(공란 허용)**: 소금·맛소금·후추·깨·통깨·참깨·마무리용 참기름 등 양에 둔감한 마무리 간. (이 예외가 없으면 \"소금\"만 공란인 정상 레시피까지 차단되어 오탐이 급증함.)\n\n### Rule B (휴리스틱 · LLM) — 사전손질 동사 누락\n원물 상태로 조리 스텝에 바로 투입 불가한 재료인데 어떤 스텝에도 손질 동사가 없으면 → `needs_review` (`missing_prep_step`).\n- 예: 메추리알(삶다/까다), 오징어(손질·썰다), 마른표고(불리다), 생새우(손질/데치다), 미역(불리다)\n- 재료-동사 매핑 판단이 필요하므로 LLM 검수 단계에서 적용 권장.\n\n### Rule C (사전 룩업) — 외국어 재료명 미번역/오역\n재료명이 한국 표준 식재료명으로 정규화되지 않은 경우 → `needs_review` (`unlocalized_ingredient_name`).\n- (a) 한자 음독 직역(新玉→신옥), (b) 외래어 음차만(サーモン→서먼), (c) 식재료 사전/상품 카탈로그 미존재.\n- 검출: 기존 상품 카탈로그 + 한국 표준 식재료 사전과 대조. 미매칭 → 플래그 + 정규화 후보 제시. 비한국어 원본 레시피는 더 엄격히 적용.\n\n### Rule D (결정론) — 비현실적 수치\n두께·길이·시간·온도가 상식 범위를 벗어나면 → `needs_review` (`implausible_measurement`).\n- 예: 썰기 두께 < 2mm 또는 > 100mm, 조리 시간 = 0분 등. \"두께 + mm + 값 < 2\"로 0.8mm 즉시 검출. 단위 환산 오류(mm↔cm) 의심 시 보정값 제안.\n\n### Rule E (하드 게이트 · 결정론) — 생식 요리 안전 라벨링\n가열 단계가 없는데 어패류·육류·난류를 섭취하는 레시피에서 \"생식용/회용/사시미용\" 명시가 없으면 → 즉시 `needs_review` (`raw_consumption_safety`).\n```\n조리 스텝에 가열 동사(굽다/삶다/끓이다/볶다/튀기다/데치다 등) 없음  AND  어패류·육류·날달걀 재료 존재\n→ 생식 판정 → 안전 라벨 미존재 시 차단\n```\n- 안전 직결이므로 하드 게이트. 통과시키려면 \"생식용(사시미급) 연어\"처럼 등급 명시 보강 필요.\n\n### Rule F (결정론) — 재료 목록 ↔ 조리 스텝 정합성\n조리 스텝과 재료 목록이 어긋나면 → `needs_review`.\n- **F-1 재료 누락**: 스텝에 등장하는 재료가 목록 부재 (예: 436 맛소금·채수) → `ingredient_missing_in_list`\n- **F-2 수량 불일치**: 같은 재료 수량이 목록 ≠ 스텝 (예: 430 계란 5개 vs 3개) → `quantity_mismatch`\n- **예외(팬트리)**: 식용유·물·소금·후추 등 기본 재료가 스텝에 **분량과 함께** 등장하면 목록 누락이어도 면제 (예: 261 식용유 \"넉넉히 3바퀴\").\n- 검출: 스텝에서 재료명·수량 토큰 추출 → 목록과 양방향 대조. 동일 재료 다중 스텝 사용 시 분량 배분 여부도 점검.\n\n### Rule G (하드 게이트 · 결정론) — 조리 시간 안전·정합\n가열 조리의 시간이 누락·비현실·출처 불일치이면 → `needs_review`.\n- **G-1 단백질 안전**: 가열 조리 + 육류·어패류인데 시간이 없거나 안전 최소치 미만(예: 430 \"닭다리 600g 무수분 20분\") → 즉시 보류. `unsafe_cook_time`. **하드 게이트(식중독).**\n- **G-2 값 충돌**: 화면자막 시간 ≠ 요약 시간(예: 430 화면 40분 vs 요약 20분) → 보류. `cook_time_mismatch`\n\n### Rule H (groundedness · 텍스트 대조 + LLM) — 원본 정합성 〔환각 차단 · 최중요〕\n요약의 재료·단계가 **원본(캡션/자막/STT)에 실재하는지** 대조해 환각을 차단합니다.\n- **H-1 재료 환각**: 요약 재료가 원본 입력 어디에도 없음(예: 430 \"단호박·치즈·계란·새송이\" — 영상에 없음) → 보류. `ingredient_not_in_source`\n- **H-2 핵심 블록 누락**: 원본의 핵심 단계/재료 블록이 요약에 없음(예: 430 \"크레이지 소스\" 전체) → 보류. `core_block_missing`\n- 검출: 요약 토큰을 원본 텍스트와 1차 대조(결정론) + 의미 단위는 LLM 판정.\n- **430처럼 제목만 보고 다른 레시피를 생성하는 통째 환각은 H 없이는 못 잡습니다.** 사용자 신뢰에 가장 치명적인 결함을 막는 핵심 룰.\n\n### 3.1 보류 처리 (제안)\n- **자동 표준화 (보류 안 함)**: Rule A-1 (N<20 → 큰술 렌더링).\n- **즉시 보류 (하드 게이트)**: Rule A-2 · E · G-1 — \"음식 망함\" 또는 \"건강 위험\"(생식·덜 익은 단백질).\n- **정규화·검수·재생성 후 노출**: Rule C · D · F · G-2 · H.\n- **재검토 대상**: Rule B.\n\n### 3.2 도입 순서 (제안)\n- **1순위 (결정론, 추가 호출 0)**: A · D · E · F · **G-1** → 먼저 배포.\n- **2순위 (사전·원본 텍스트 대조)**: C · **G-2 · H(1차)** → 환각 차단(H)은 우선순위 높음.\n- **3순위 (LLM 판정)**: B · **H(의미 판정)**.\n\n### 3.3 위 5건에 적용하면\n| 레시피 | 결과 | 처리 |\n|------|:---:|------|\n| 비빔국수 (436) | **보류** | A-2(양념장 공란) + F-1(맛소금·채수 누락) |\n| 서먼 아보카도 덮밥 (435) | **보류** | D(0.8mm — 출처 오타지만 sanity-check로 검출) + E(사시미용 라벨 확인) |\n| 무수분 백숙 (430) | **보류** | **G-1**(닭 20분) · **G-2**(40↔20) · **H**(단호박/치즈 환각 + 크레이지소스 누락) |\n| 소보루장조림 (414) | **자동 표준화** | A-1로 \"간장 12큰술\" 등 렌더링 후 통과(전부 20 미만). 손질 누락은 B(LLM) |\n| 류수영 오징어볶음 (261) | **통과** | (식용유는 팬트리 예외) |\n| 콩국수 (콩국수) | **통과** | (얼음만 목록 누락, 팬트리급 — 합격) |\n| 까망베르 샤브샤브 (440) | **보류** | A-2(분량 전무) + F(고기 누락·\"채소\" 부실) — 단, 근본은 입력 텍스트 빈곤(§2) |\n\n→ 결정론(1순위)만으로 위험 2건(436·435) 보류, 414 자동 표준화, 261 통과(오탐 0). **430의 통째 환각은 결정론만으론 부족해 Rule G(시간 안전)·H(groundedness)가 필요**하며, 사용자 신뢰상 H 도입 우선순위가 높습니다.\n\n### 3.4 알려진 한계\n**주재료(비양념) 분량 공란**은 Rule A(양념 전용) 대상이 아니라 부분적으로만 잡힙니다. \"비양념 재료 분량 공란 N개 이상 → 저severity 경고\" 옵션을 검토할 수 있으나, 찜·국류는 분량에 관대하므로 하드 게이트로는 권장하지 않습니다(오탐 위험). 정밀 판정은 Rule H(groundedness) 또는 LLM 단계에서 함께 봅니다.\n\n---\n\n**문서 버전 관리**\n\n| 버전 | 날짜 | 변경 내용 |\n|------|------|----------|\n| 1.0 | 2026.06 | 개발사 전달용 경량본 — 관찰 사실(5건) + 합격선(261) + 진단 질문 + 검수 게이트 룰 A~F |\n| 1.1 | 2026.06 | Rule A-1을 '차단' → **'큰술 자동 표준화 + 상한(20) 보류'** 2단으로 변경(한국 단위 생략 관습 반영, 오탐 방지). A-2는 하드 게이트 유지. §1.2·§3.1·§3.3 정합화 — 414는 보류 아닌 자동 표준화로 처리 |\n| 1.2 | 2026.06 | §1.1 비빔국수 강화 — **원본 자막·캡션엔 분량이 전부 텍스트로 있었으나 요약이 소실**(화면 OCR 부재 문제 아님)임을 증거(고추장 크게1·진간장4… / 맛소금 1/2티스푼)로 명시. §2 진단 질문을 캡션 텍스트 활용 포함으로 정교화 |\n| 1.3 | 2026.06 | **§1.3 무수분 백숙(430) 전면 교체 — '통째 환각'으로 격상.** 원본 영상(닭+양파+크레이지소스) vs 요약(단호박+치즈+계란) 대조: 없는 재료 날조 + 핵심 누락 + 시간 40→20 조작. **Rule G(시간 안전·정합)·Rule H(groundedness/환각 차단) 신설**, §0·§3.1·§3.2·§3.3·§3.4 정합화. 430을 최악 사례로 명시 |\n| 1.4 | 2026.06 | §1.3 환각을 **원본 영상 47초 프레임 검증으로 확정**(캡션 추론 → 영상 직접 확인). 단호박·치즈·계란·새송이·올리브오일 0회 등장 명시, \"계란\"=양파 오인 추정, **밥(누룽지) 누락 추가** |\n| 1.5 | 2026.06 | **각 요리 팩트(§1.1~1.5) 아래에 결함 유형 표를 개별 삽입** — 결함 유형(재료 날조/핵심 누락/시간 조작 등) × 구분(치명·준치명·경미·예외) × 내용. 발생한 결함만 행으로 정리 |\n| 1.6 | 2026.06 | **§1.4(435) 원본 캡션 대조 후 정정.** \"아보카도 0.8mm\"는 졸리팟 환각이 아니라 **원본 캡션의 오타를 충실히 복사**한 것으로 확인. 생식 안전도 **원본이 \"사시미용 연어\" 명시 → 레시피는 안전**, 졸리팟 라벨 보존 여부만 쟁점으로 재프레이밍. 확정 졸리팟 결함은 \"신옥 미번역\" |\n| 1.7 | 2026.06 | **케이스 6(콩국수)·7(까망베르 샤브샤브) 추가.** 6=자막 또렷 → 충실 추출, 두 번째 합격 사례. 7=자막 없음+모호 캡션 → 부실(고기 누락·\"채소\" 뭉뚱그림·와사비장 레시피 없음·분량 전무). §2에 **입력 갭 2종(텍스트 OCR vs 시각 인식)** 정리 추가 |\n| 1.8 | 2026.06 | **§2에 플랫폼 상관 + 처리 경로 진단 질문 추가.** 합격 2건=유튜브, 결함 5건=인스타. \"인스타는 제미나이에 영상 파일을 넣나(ⓐ) 캡션만 넣나(ⓑ)?\" 질문 신설. 토큰은 한도 무관(릴스 90초도 컨텍스트 3% 미만), 실제 과제는 영상 다운로드 안정성임을 명시 |\n| 1.9 | 2026.06 | 까망베르 샤브샤브 **실제 URL(recipes/440)** 반영(§1.7·요약표·§3.3). **요약 표에 플랫폼(유튜브/인스타) 열 추가** — 유튜브 2=합격, 인스타 5=결함 한눈에 |\n| 1.10 | 2026.06 | **요약 표를 문서 상단(§0 뒤·§1 앞)으로 이동** — 케이스 상세 전에 전체 그림 먼저. §0 \"5건→7건\" 정정 |\n"</script>
